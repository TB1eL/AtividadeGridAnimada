<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout CSS Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: grid;
        grid-template-areas:
          "header header"
          "sidebar main"
          "footer footer";
        grid-template-columns: 250px 1fr;
        grid-template-rows: 80px 1fr 60px;
        min-height: 100vh;
      }

      header {
        grid-area: header;
        background-color: #1a1a1a;
        color: white;
        display: flex;
        align-items: center;
        padding: 0 20px;
      }

      nav {
        grid-area: sidebar;
        background-color: #2c2c2c;
        color: #ddd;
        padding: 20px;
      }

      main {
        grid-area: main;
        background-color: #f4f4f4;
        padding: 30px;
      }

      footer {
        grid-area: footer;
        background-color: #1a1a1a;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Logo</h1>
    </header>

    <nav>
      <h3>Menu Lateral</h3>
      <ul style="list-style: none; margin-top: 10px">
        <li>Início</li>
        <li>Projetos</li>
        <li>Configurações</li>
      </ul>
    </nav>

    <main>
      <h2>Conteúdo Principal</h2>
      <p>
        Este layout utiliza <strong>grid-template-areas</strong>, que é a forma
        mais visual de organizar elementos no CSS Grid.
      </p>
    </main>

    <footer>
      <p>
        &copy; 2026 - Desenvolvido por o mestre do CSS Gabriel de Oliveira
        Caldas
      </p>
    </footer>
  </body>
</html>
